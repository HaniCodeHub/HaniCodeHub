<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="280" fill="#0d1117"/>

  <!-- faint scan grid -->
  <g stroke="#161b22" stroke-width="1">
    <line x1="0" y1="70" x2="1200" y2="70"/>
    <line x1="0" y1="140" x2="1200" y2="140"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="300" y1="0" x2="300" y2="280"/>
    <line x1="600" y1="0" x2="600" y2="280"/>
    <line x1="900" y1="0" x2="900" y2="280"/>
  </g>

  <!-- outer frame corners -->
  <g stroke="#30363d" stroke-width="1.5" fill="none">
    <path d="M20,20 L20,40 M20,20 L40,20"/>
    <path d="M1180,20 L1180,40 M1180,20 L1160,20"/>
    <path d="M20,260 L20,240 M20,260 L40,260"/>
    <path d="M1180,260 L1180,240 M1180,260 L1160,260"/>
  </g>

  <!-- detection box around name block: corners draw in first -->
  <g stroke="#7ee787" stroke-width="1.5" fill="none" stroke-dasharray="40" stroke-dashoffset="40">
    <path d="M60,60 L60,80 M60,60 L90,60">
      <animate attributeName="stroke-dashoffset" from="40" to="0" begin="0.1s" dur="0.4s" fill="freeze"/>
    </path>
    <path d="M620,60 L620,80 M620,60 L590,60">
      <animate attributeName="stroke-dashoffset" from="40" to="0" begin="0.2s" dur="0.4s" fill="freeze"/>
    </path>
    <path d="M60,215 L60,195 M60,215 L90,215">
      <animate attributeName="stroke-dashoffset" from="40" to="0" begin="0.3s" dur="0.4s" fill="freeze"/>
    </path>
    <path d="M620,215 L620,195 M620,215 L590,215">
      <animate attributeName="stroke-dashoffset" from="40" to="0" begin="0.4s" dur="0.4s" fill="freeze"/>
    </path>
  </g>

  <!-- name: words resolve one after another, like a scan settling on a match -->
  <text y="122" font-family="JetBrains Mono, Consolas, monospace" font-size="40" font-weight="700" fill="#f0f6fc">
    <tspan x="90" opacity="0">Muhammad
      <animate attributeName="opacity" from="0" to="1" begin="0.7s" dur="0.5s" fill="freeze"/>
    </tspan>
    <tspan dx="18" opacity="0">Hanan
      <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.5s" fill="freeze"/>
    </tspan>
  </text>

  <text x="90" y="155" font-family="JetBrains Mono, Consolas, monospace" font-size="16" fill="#8b949e" opacity="0">Python developer &#8594; AI Full-Stack Developer (in progress)
    <animate attributeName="opacity" from="0" to="1" begin="1.7s" dur="0.5s" fill="freeze"/>
  </text>
  <text x="90" y="195" font-family="JetBrains Mono, Consolas, monospace" font-size="13" fill="#7ee787" opacity="0">class: ai_full_stack_dev  conf: 0.72  status: training
    <animate attributeName="opacity" from="0" to="1" begin="2.1s" dur="0.5s" fill="freeze"/>
  </text>

  <!-- right side: muzzle recognition detection callout, referencing actual project -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.4s" dur="0.6s" fill="freeze"/>
    <ellipse cx="960" cy="155" rx="55" ry="42" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <circle cx="935" cy="115" r="12" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <circle cx="965" cy="108" r="12" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <circle cx="993" cy="118" r="11" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <circle cx="1000" cy="145" r="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>

    <g stroke="#7ee787" stroke-width="1.5" fill="none">
      <path d="M880,90 L880,105 M880,90 L895,90"/>
      <path d="M1040,90 L1040,105 M1040,90 L1025,90"/>
      <path d="M880,220 L880,205 M880,220 L895,220"/>
      <path d="M1040,220 L1040,205 M1040,220 L1025,220"/>
    </g>

    <text x="960" y="245" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#7ee787">muzzle_pattern: detected</text>
  </g>
</svg>
